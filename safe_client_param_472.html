<!DOCTYPE html>
<!-- SAFE mirror of client_param_472.html (CWE-472). The client sends only an
     opaque product id / quantity; the price and total are authoritative on the
     server. No client-controlled amount is trusted. ZERO security findings expected. -->
<html>
<body>
  <form id="checkout" action="/api/charge" method="post">
    <!-- Only a product identifier and quantity — never the price/total. -->
    <input type="hidden" name="sku" value="WIDGET-001">
    <input type="number" name="qty" value="1" min="1" max="10">
    <button type="submit">Buy</button>
  </form>
  <script>
    document.getElementById('checkout').addEventListener('submit', (e) => {
      e.preventDefault();
      const form = e.target;
      // Safe: send only sku + qty; the server looks up the price and computes the
      // charge authoritatively. Nothing price-bearing comes from the client.
      fetch('/api/charge', {
        method: 'POST',
        body: JSON.stringify({ sku: form.sku.value, qty: Number(form.qty.value) }),
      });
    });
  </script>
</body>
</html>
